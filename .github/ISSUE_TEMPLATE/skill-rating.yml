name: 技能评分
description: 为一个 ProbePilotAI 技能提交公开、可审核的评分反馈
title: "[评分] "
labels:
  - skill-rating
body:
  - type: input
    id: skill_id
    attributes:
      label: Skill ID
      description: 从技能卡片或 registry.json 复制技能 ID。
      placeholder: probepilot-flash
    validations:
      required: true
  - type: dropdown
    id: rating
    attributes:
      label: 评分
      options:
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 使用版本
      placeholder: 1.0.0
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: 使用反馈
      description: 请说明使用场景、成功或失败证据，以及改进建议。
    validations:
      required: true
