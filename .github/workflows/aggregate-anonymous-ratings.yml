name: Aggregate anonymous skill ratings

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

concurrency:
  group: anonymous-rating-aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Aggregate anonymous ratings
        env:
          RATINGS_API_EXPORT_URL: ${{ secrets.RATINGS_API_EXPORT_URL }}
          RATINGS_API_TOKEN: ${{ secrets.RATINGS_API_TOKEN }}
        run: python tools/aggregate_anonymous_ratings.py
      - name: Commit registry rating aggregate
        run: |
          git config user.name "probepilotai-ratings[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry.json
          git diff --cached --quiet || git commit -m "Aggregate anonymous skill ratings"
          git push
