name: Aggregate skill ratings

on:
  issues:
    types: [opened, edited, labeled, reopened]

permissions:
  contents: write
  issues: read

concurrency:
  group: skill-rating-aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    if: contains(github.event.issue.labels.*.name, 'skill-rating') || github.event.action == 'opened' || github.event.action == 'edited'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Aggregate public ratings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python tools/aggregate_ratings.py
      - name: Commit registry rating aggregate
        run: |
          git config user.name "probepilotai-ratings[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry.json
          git diff --cached --quiet || git commit -m "Aggregate public skill ratings"
          git push
